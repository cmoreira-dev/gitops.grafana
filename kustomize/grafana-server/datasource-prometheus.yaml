---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: ds-prometheus
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      instance: grafana
  datasource:
    name: Prometheus
    type: prometheus
    uid: Prometheus
    access: proxy
    url: http://prometheus-operated.observability.svc.cluster.local:9090
    isDefault: true
    editable: true