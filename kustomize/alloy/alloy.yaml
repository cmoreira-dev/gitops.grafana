---
apiVersion: collectors.grafana.com/v1alpha1
kind: Alloy
metadata:
  name: alloy
  namespace: alloy
spec:
  controller:
    type: daemonset

  alloy:
    configMap:
      content: |-
        prometheus.remote_write "mimir" {
          endpoint {
            url = "http://mimir-gateway.mimir.svc.cluster.local/api/v1/push"
          }
        }

        prometheus.exporter.self "alloy" {}

        prometheus.scrape "alloy_self" {
          targets         = prometheus.exporter.self.alloy.targets
          scrape_interval = "15s"
          forward_to      = [prometheus.relabel.add_cluster.receiver]
        }

        discovery.kubernetes "kube_state_metrics_eps" {
          role = "endpointslice"
        }

        discovery.relabel "kube_state_metrics" {
          targets = discovery.kubernetes.kube_state_metrics_eps.targets

          // namespace do endpointslice
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            regex         = "prometheus"
            action        = "keep"
          }

          // filtra pelo label kubernetes.io/service-name = prometheus-kube-state-metrics
          rule {
            source_labels = ["__meta_kubernetes_endpointslice_label_kubernetes_io_service_name"]
            regex         = "prometheus-kube-state-metrics"
            action        = "keep"
          }

          // (opcional) porta — vamos deixar SEM filtro primeiro pra validar
          // depois refinamos se você quiser.

          rule {
            target_label = "job"
            replacement  = "kube-state-metrics"
            action       = "replace"
          }
        }

        prometheus.exporter.unix "node" {
          procfs_path = "/proc"
          sysfs_path  = "/sys"
        }

        prometheus.scrape "node" {
          targets         = prometheus.exporter.unix.node.targets
          scrape_interval = "30s"
          forward_to      = [prometheus.relabel.add_cluster.receiver]
        }

        prometheus.relabel "add_cluster" {
        forward_to = [prometheus.remote_write.mimir.receiver]

          rule {
            target_label = "cluster"
            replacement  = "homelab-k3s"
            action       = "replace"
          }
        }

        prometheus.scrape "kube_state_metrics" {
          targets         = discovery.relabel.kube_state_metrics.output
          scrape_interval = "30s"
          forward_to      = [prometheus.relabel.add_cluster.receiver]
        }

        discovery.kubernetes "nodes" {
          role = "node"
        }

        discovery.relabel "kubelet" {
          targets = discovery.kubernetes.nodes.targets

          // aponta para a porta do kubelet
          rule {
            target_label = "__address__"
            replacement  = "$1:10250"
            source_labels = ["__meta_kubernetes_node_address_InternalIP"]
            action       = "replace"
          }

          // caminho cadvisor
          rule {
            target_label = "__metrics_path__"
            replacement  = "/metrics/cadvisor"
            action       = "replace"
          }

          // labels úteis
          rule {
            source_labels = ["__meta_kubernetes_node_name"]
            target_label  = "node"
            action        = "replace"
          }
        }

        prometheus.scrape "kubelet_cadvisor" {
          targets         = discovery.relabel.kubelet.output
          scrape_interval = "30s"
          scheme          = "https"

          tls_config {
            insecure_skip_verify = true
          }

          authorization {
            type = "Bearer"
            credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          }

          forward_to = [prometheus.relabel.add_cluster.receiver]
        }





