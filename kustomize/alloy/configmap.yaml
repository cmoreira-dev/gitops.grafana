---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
data:
  config.alloy: |
    // =====================
    // Remote write: Mimir
    // =====================
    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://mimir-gateway.mimir.svc.cluster.local/api/v1/push"
      }
    }

    // =====================
    // 0) Prova de vida: métricas do próprio Alloy -> Mimir
    // =====================
    prometheus.exporter.self "alloy" {}

    prometheus.scrape "alloy_self" {
      targets         = prometheus.exporter.self.alloy.targets
      scrape_interval = "15s"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }

    // =====================
    // 1) Discovery: Pods (opt-in por annotations)
    // =====================
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods_scrape" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
        action        = "replace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "$1"
        action        = "replace"
      }

      rule { source_labels = ["__meta_kubernetes_namespace"] target_label = "namespace" action = "replace" }
      rule { source_labels = ["__meta_kubernetes_pod_name"]  target_label = "pod"       action = "replace" }
      rule { source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"] target_label = "app" action = "replace" }
    }

    prometheus.scrape "k8s_pods_annotated" {
      targets         = discovery.relabel.pods_scrape.output
      scrape_interval = "30s"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }

    // =====================
    // 2) kube-state-metrics via EndpointSlice (sem mexer no chart)
    // =====================
    discovery.kubernetes "kube_state_metrics_eps" {
      role = "endpointslices"
    }

    discovery.relabel "kube_state_metrics" {
      targets = discovery.kubernetes.kube_state_metrics_eps.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex         = "prometheus"
        action        = "keep"
      }

      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        regex         = "prometheus-kube-state-metrics"
        action        = "keep"
      }

      rule {
        source_labels = ["__meta_kubernetes_endpoint_port"]
        regex         = "8080"
        action        = "keep"
      }

      rule { target_label = "job" replacement = "kube-state-metrics" action = "replace" }
    }

    prometheus.scrape "kube_state_metrics" {
      targets         = discovery.relabel.kube_state_metrics.output
      scrape_interval = "30s"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }
